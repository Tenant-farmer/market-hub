<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}market-hub{% endblock %}</title>
<style>
  :root {
    color-scheme: dark;
    --page:      #0d0d0d;
    --surface:   #1a1a19;
    --ink:       #ffffff;
    --ink-2:     #c3c2b7;
    --muted:     #898781;
    --grid:      #2c2c2a;
    --baseline:  #383835;
    --border:    rgba(255,255,255,0.10);
    --up:        #0ca30c;
    --down:      #d03b3b;
    --warn:      #fab219;
    --accent:    #3987e5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  nav {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
  }
  nav .brand { font-weight: 700; margin-right: 16px; }
  nav a {
    color: var(--ink-2); text-decoration: none; padding: 4px 10px; border-radius: 6px;
  }
  nav a.active { color: var(--ink); background: var(--surface); }
  nav a:hover { color: var(--ink); }
  nav .off { color: var(--muted); padding: 4px 10px; cursor: default; }
  .nav-group { position: relative; }
  .nav-group > span {
    color: var(--ink-2); padding: 4px 10px; border-radius: 6px; cursor: default;
    display: inline-block;
  }
  .nav-group > span.active { color: var(--ink); background: var(--surface); }
  .nav-group:hover > span { color: var(--ink); }
  .nav-group .menu {
    display: none; position: absolute; top: 100%; left: 0; z-index: 50;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px; min-width: 140px;
  }
  .nav-group:hover .menu { display: block; }
  .nav-group .menu a { display: block; padding: 6px 10px; white-space: nowrap; }
  main { padding: 20px; max-width: 1280px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cards3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  .cards6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 16px; }
  @media (max-width: 1200px) { .cards6 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 980px) { .grid2, .cards3 { grid-template-columns: 1fr; } .cards6 { grid-template-columns: repeat(2, 1fr); } }
  .rangebar {
    position: relative; height: 6px; border-radius: 3px; margin: 8px 0 2px;
    background: linear-gradient(90deg, #0ca30c, #fab219, #d03b3b);
  }
  .rangebar .mark {
    position: absolute; top: -3px; width: 3px; height: 12px;
    background: #fff; border-radius: 2px; transform: translateX(-50%);
  }
  .rankb {
    display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
    align-items: center; justify-content: center;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
  }
  .score { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .reason { color: var(--ink-2); font-size: 12px; margin-top: 4px; }
  table { border-collapse: collapse; width: 100%; }
  th {
    text-align: right; color: var(--muted); font-weight: 500; font-size: 12px;
    padding: 6px 8px; border-bottom: 1px solid var(--baseline);
  }
  th:first-child, td:first-child { text-align: left; }
  td {
    padding: 6px 8px; border-bottom: 1px solid var(--grid);
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .pos { color: var(--up); }
  .neg { color: var(--down); }
  .chip {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 12px; border: 1px solid var(--border); color: var(--ink-2);
  }
  .hot { color: var(--warn); font-size: 12px; white-space: nowrap; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .pills a {
    color: var(--ink-2); text-decoration: none; font-size: 12px;
    padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px;
  }
  .pills a.on { color: var(--ink); border-color: var(--accent); background: rgba(57,135,229,.12); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">market-hub</span>
  <a href="/" class="{{ 'active' if active=='overview' }}">개요</a>
  <div class="nav-group">
    <span class="{{ 'active' if active in ('us', 'kr') }}">시장 ▾</span>
    <div class="menu">
      <a href="/us" class="{{ 'active' if active=='us' }}">US 섹터</a>
      <a href="/kr" class="{{ 'active' if active=='kr' }}">KR 섹터</a>
    </div>
  </div>
  <div class="nav-group">
    <span class="{{ 'active' if active=='stocks' }}">종목 ▾</span>
    <div class="menu">
      <a href="/stocks?mkt=us">US 종목</a>
      <a href="/stocks?mkt=kr">KR 종목</a>
    </div>
  </div>
  <div class="nav-group">
    <span class="{{ 'active' if active in ('leaders', 'kr_leaders') }}">주도주 ▾</span>
    <div class="menu">
      <a href="/leaders" class="{{ 'active' if active=='leaders' }}">US 주도주</a>
      <a href="/kr-leaders" class="{{ 'active' if active=='kr_leaders' }}">KR 주도주</a>
    </div>
  </div>
  <a href="/signals" class="{{ 'active' if active=='signals' }}">지표</a>
  <div class="nav-group">
    <span class="{{ 'active' if active in ('calendar', 'fed') }}">일정 ▾</span>
    <div class="menu">
      <a href="/calendar?tab=econ" class="{{ 'active' if active=='calendar' }}">경제·실적 일정</a>
      <a href="/fed" class="{{ 'active' if active=='fed' }}">Fed Watch</a>
    </div>
  </div>
  <a href="/gurus" class="{{ 'active' if active=='gurus' }}">구루 13F</a>
  <a href="/positions" class="{{ 'active' if active=='positions' }}">포지션</a>
  <a href="/health" class="{{ 'active' if active=='health' }}">상태</a>
</nav>
<main>{% block body %}{% endblock %}</main>
</body>
</html>
